name: Release macOS app

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: Existing semantic version tag to publish or rebuild
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: release-${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
  cancel-in-progress: false

jobs:
  release:
    name: Build and publish
    runs-on: macos-15
    env:
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Check out release tag
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}

      - name: Verify version matches tag
        run: |
          APP_VERSION="$(/usr/libexec/PlistBuddy -c 'Print :CFBundleShortVersionString' Config/Info.plist)"
          if [[ "$RELEASE_TAG" != "v$APP_VERSION" ]]; then
            echo "Tag $RELEASE_TAG does not match app version v$APP_VERSION" >&2
            exit 1
          fi

      - name: Build signed app archive
        run: make release

      - name: Create or update GitHub Release
        run: |
          ASSETS=(
            dist/SpritePetStudio-macOS.zip
            dist/SpritePetStudio-macOS.zip.sha256
          )
          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release upload "$RELEASE_TAG" "${ASSETS[@]}" --clobber
          else
            gh release create "$RELEASE_TAG" "${ASSETS[@]}" \
              --verify-tag \
              --generate-notes \
              --title "SpritePet Studio $RELEASE_TAG"
          fi
